name: Package Latest

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: package-latest
  cancel-in-progress: false

jobs:
  package-latest:
    name: Build latest install package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y php-cli zip unzip
          gh --version

      - name: Read extension version
        id: version
        run: |
          version="$(php -r '$xml = simplexml_load_file("meta.xml"); echo trim((string) $xml->version);')"
          if [ -z "$version" ]; then
            echo "Unable to read version from meta.xml" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Validate PHP syntax
        run: |
          find plib htdocs sbin \( -name '*.php' -o -name '*.phtml' \) -print0 \
            | sort -z \
            | xargs -0 -n1 php -l

      - name: Validate extension metadata
        run: |
          php -r '
          $xml = simplexml_load_file("meta.xml");
          if (!$xml) {
              fwrite(STDERR, "meta.xml is not valid XML\n");
              exit(1);
          }
          foreach (["name", "version", "vendor"] as $field) {
              if (trim((string) $xml->{$field}) === "") {
                  fwrite(STDERR, "Missing meta.xml field: {$field}\n");
                  exit(1);
              }
          }
          '

      - name: Build latest ZIP
        run: |
          version="${{ steps.version.outputs.version }}"
          versioned="supervisor-manager-${version}.zip"
          COPYFILE_DISABLE=1 zip -r "$versioned" meta.xml DESCRIPTION.md CHANGES.md README.md htdocs plib sbin \
            -x '*.DS_Store' -x '__MACOSX/*'
          zip -T "$versioned"
          cp "$versioned" supervisor-manager.zip

      - name: Prepare latest release notes
        run: |
          cat > latest-release-notes.md <<EOF
          Rolling latest package for Supervisor Manager.

          Version: ${{ steps.version.outputs.version }}
          Commit: ${GITHUB_SHA}

          Install with:

          \`\`\`sh
          plesk bin extension --install-url https://github.com/${GITHUB_REPOSITORY}/releases/download/latest/supervisor-manager.zip
          \`\`\`
          EOF

      - name: Move latest tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f latest "$GITHUB_SHA"
          git push origin refs/tags/latest --force

      - name: Publish latest package
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${{ steps.version.outputs.version }}"
          title="Supervisor Manager latest (v${version})"
          if gh release view latest >/dev/null 2>&1; then
            gh release upload latest supervisor-manager.zip --clobber
            gh release edit latest --title "$title" --notes-file latest-release-notes.md --prerelease
          else
            gh release create latest supervisor-manager.zip \
              --title "$title" \
              --notes-file latest-release-notes.md \
              --prerelease
          fi
