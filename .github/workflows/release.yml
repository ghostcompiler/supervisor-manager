name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v1.0.3"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y php-cli zip unzip
          gh --version

      - name: Resolve release version
        id: version
        run: |
          meta_version="$(php -r '$xml = simplexml_load_file("meta.xml"); echo trim((string) $xml->version);')"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          tag_version="${tag#v}"
          if [ "$meta_version" != "$tag_version" ]; then
            echo "meta.xml version ($meta_version) must match release tag ($tag)." >&2
            exit 1
          fi
          echo "version=$meta_version" >> "$GITHUB_OUTPUT"
          echo "tag=v$meta_version" >> "$GITHUB_OUTPUT"

      - name: Validate PHP syntax
        run: |
          find plib htdocs sbin \( -name '*.php' -o -name '*.phtml' \) -print0 \
            | sort -z \
            | xargs -0 -n1 php -l

      - name: Build release ZIP assets
        run: |
          version="${{ steps.version.outputs.version }}"
          versioned="supervisor-manager-${version}.zip"
          COPYFILE_DISABLE=1 zip -r "$versioned" meta.xml DESCRIPTION.md CHANGES.md README.md htdocs plib sbin \
            -x '*.DS_Store' -x '__MACOSX/*'
          zip -T "$versioned"

      - name: Generate release notes
        run: |
          awk 'NR == 1 { next } /^# / { exit } { print }' CHANGES.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "Supervisor Manager ${{ steps.version.outputs.tag }}" > release-notes.md
          fi

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.version.outputs.tag }}"
          version="${{ steps.version.outputs.version }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "supervisor-manager-${version}.zip" --clobber
          else
            gh release create "$tag" "supervisor-manager-${version}.zip" \
              --title "$tag" \
              --notes-file release-notes.md
          fi
